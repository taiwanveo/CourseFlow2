# CourseFlow v2 — Render Blueprint（藍圖）
# 請使用「v2 專用」Supabase / Redis，勿與 v1 共用。詳見 docs/INFRA-ISOLATION.md
#
# 首次部署（請在瀏覽器開啟）：
# https://dashboard.render.com/blueprint/new?repo=https://github.com/taiwanveo/CourseFlow2

projects:
  - name: CourseFlow2
    environments:
      - name: production
        envVarGroups:
          - name: courseflow-v2-shared
            envVars:
              - key: SUPABASE_URL
                sync: false
              - key: SUPABASE_SERVICE_ROLE_KEY
                sync: false
              - key: REDIS_URL
                sync: false
              - key: API_KEY_ENCRYPTION_SECRET
                sync: false
        services:
          - type: web
            name: courseflow-v2-web
            runtime: docker
            dockerfilePath: ./Dockerfile.web
            dockerContext: .
            plan: starter
            region: singapore
            healthCheckPath: /api/health
            autoDeploy: true
            envVars:
              - fromGroup: courseflow-v2-shared
              - key: NODE_ENV
                value: production
              - key: COURSEFLOW_EDITION
                value: v2
              # WVP 課程打包：避免 Render ~30s 閘道逾時導致 HTTP 502
              - key: COURSEFLOW_ASYNC_WVP_BUILD
                value: "1"
              # Vite build 記憶體上限（512MB 容器建議 384）
              - key: COURSEFLOW_VITE_HEAP_MB
                value: "384"
              - key: NEXT_PUBLIC_SUPABASE_URL
                sync: false
              - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
                sync: false

          - type: worker
            name: courseflow-v2-worker
            runtime: docker
            dockerfilePath: ./Dockerfile.worker
            dockerContext: .
            plan: starter
            region: singapore
            autoDeploy: true
            envVars:
              - fromGroup: courseflow-v2-shared
              - key: NODE_ENV
                value: production
              - key: COURSEFLOW_EDITION
                value: v2
